# Storage backend config (Factor IV: backing services as attached resources)
#
# Config provides defaults for local development.
# All values overridable by env vars for deployment -- see .env.example.
storage:
  backend: local          # Override: STORAGE_BACKEND
  bucket: kylel-alexisr-edu  # Override: S3_BUCKET
  prefix: ""  # Override: S3_PREFIX (empty = paths are relative to bucket root)
  root: ""                # Override: STORAGE_ROOT (local only, empty = repo root)
  paths:
    transcripts:
      - data/transcripts
      - data/transcripts/step_up.jsonl
    ground_truth:
      - data/ground_truth_v2
    annotator_results: results/annotator
    benchmark_results: results/benchmark

# Annotator model config

profile: anthropic

# Annotator archetype assignments (from classify_annotators.py analysis)
archetype_annotators:
  generous:
    - Gerber
    - Jones
    - Shields
    - Stobbe
    - Trujillo
  balanced:
    - Forbes
    - Mann
    - Padgett
  demanding:
    - Flick

# Annotator pipeline defaults (override any of these with CLI flags)
annotator:
  prompt_version: v9           # prompt version for detection + annotation
  labeller: classify_v2        # labeller prompt name (in prompts/annotator/labeller/)
  style: null                  # null = no style. Set to generous/balanced/demanding
  version: null                # null = auto-generate as {profile}_{date}
  annotation_types:
    - scaffolding
    - rapport

# Model profiles -- profile-level defaults apply to all phases.
# Per-phase sections override specific keys only where they differ.
profiles:
  gemini:
    model: gemini-3.1-pro-preview
    max_tokens: 65536
    mode: batch
    poll_interval: 30
    thinking: true
    thinking_budget: 16384
    annotate:
      context_window: 20
    advisor:
      timeout: 300

  gemini_25_pro:
    model: gemini-2.5-pro
    max_tokens: 65536
    mode: batch
    poll_interval: 30
    thinking: true
    thinking_budget: 16384
    annotate:
      context_window: 20
    advisor:
      timeout: 300

  gemini_35_flash:
    model: gemini-3.5-flash
    max_tokens: 65536
    mode: batch
    poll_interval: 30
    thinking: true
    thinking_budget: 16384
    annotate:
      context_window: 20
    advisor:
      timeout: 300

  openai:
    model: gpt-5.5-2026-04-23
    max_tokens: 128000
    mode: batch
    poll_interval: 60
    thinking: true
    thinking_budget: 16384
    reasoning_effort: medium   # OpenAI-specific: low | medium | high
    tutor:
      max_tokens: 65536
    annotate:
      context_window: 20
    advisor:
      timeout: 300

  anthropic:
    model: claude-opus-4-6
    max_tokens: 128000
    mode: batch
    poll_interval: 60
    thinking: true
    thinking_budget: 16384
    tutor:
      max_tokens: 65536
    annotate:
      context_window: 20
    advisor:
      timeout: 300

  openai_claude:
    model: gpt-5.5-2026-04-23     # default model (tutor + detect)
    max_tokens: 128000
    mode: batch
    poll_interval: 60
    thinking: true
    thinking_budget: 16384
    reasoning_effort: medium   # OpenAI-specific: low | medium | high
    tutor:
      max_tokens: 65536
    annotate:
      model: claude-opus-4-6         # annotation uses Claude
      context_window: 20
    label:
      model: claude-opus-4-6
    advisor:
      model: claude-opus-4-6
      timeout: 300

# Retry settings
retry:
  max_retries: 5
  base_delay: 5

# Evaluation settings
eval:
  iou_threshold: 0.3

# Batch API settings
batch:
  timeout: 86400     # max seconds to poll a batch job (24h)

# Benchmark model config
benchmark:
  version: null                # null = auto-generate as {tutor_profile}_{date}
  scenarios:
    mode: detected                # detected | random | both
    max_scenarios: 0
    random_count: 50
    random_seed: 42
    min_turn: 10

  exchange:
    num_turns: 2
    poll_interval: 60
    prompt_version: v1           # tutor/student system prompt version

  tutor_profiles:
    - anthropic

  student:
    profile: anthropic

  detect:
    profile: anthropic
    prompt_version: v5

  annotator:
    profile: anthropic
    prompt_version: profiles
    styles:
      - generous
      - balanced
      - demanding
    context_window: 20
    mode: batch
    poll_interval: 60

  aggregation:
    label_weights:
      effective: 1.0
      partial: 0.5
      ineffective: 0.0
