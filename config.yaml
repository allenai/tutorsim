# Storage backend config (Factor IV: backing services as attached resources)
#
# Config provides defaults for local development.
# All values overridable by env vars for deployment -- see .env.example.
storage:
  backend: local          # Override: STORAGE_BACKEND
  bucket: kylel-alexisr-edu  # Override: S3_BUCKET
  prefix: ""  # Override: S3_PREFIX (empty = paths are relative to bucket root)
  root: ""                # Override: STORAGE_ROOT (local only, empty = repo root)
  paths:
    transcripts:
      - data/transcripts
    ground_truth:
      - data/ground_truth_v2
    annotator_results: results/annotator
    benchmark_results: results/benchmark
    screenshots: deidentified/screenshots

# Annotator model config

profile: anthropic

# Annotator archetype assignments (from classify_annotators.py analysis)
archetype_annotators:
  generous:
    - Gerber
    - Jones
    - Shields
    - Stobbe
    - Trujillo
  balanced:
    - Forbes
    - Mann
    - Padgett
  demanding:
    - Flick

# Annotator pipeline defaults (override any of these with CLI flags)
annotator:
  prompt_version: v4           # prompt version for detection + annotation
  # Labeller routes per annotation_type. Each value names a file in
  # prompts/annotator/labeller/ (without .txt). Scaffolding and rapport humans
  # rate the partial cell differently; this routing was validated on the
  # labeller_validation hold-out (test_v2 kappa 0.725 -> 0.782, no binary
  # regression). See docs/plans/2026-05-20-labeller-validation.md.
  # For a single-template labeller pass a string instead of a dict.
  labeller:
    scaffolding: classify_scaffolding
    rapport: classify_rapport
  style: null                  # null = no style. Set to generous/balanced/demanding
  version: null                # null = auto-generate as {profile}_{date}
  annotation_types:
    - scaffolding
    - rapport

# Model profiles -- profile-level defaults apply to all phases.
# Per-phase sections override specific keys only where they differ.
profiles:
  gemini:
    model: gemini-3.1-pro-preview
    max_tokens: 65536
    mode: batch
    poll_interval: 30
    thinking: true
    thinking_budget: 16384
    annotate:
      context_window: 20
    advisor:
      timeout: 300

  openai:
    model: gpt-5.4
    max_tokens: 128000
    mode: batch
    poll_interval: 60
    thinking: true
    thinking_budget: 16384
    reasoning_effort: medium   # OpenAI-specific: low | medium | high
    tutor:
      max_tokens: 65536
    annotate:
      context_window: 20
    advisor:
      timeout: 300

  anthropic:
    model: claude-opus-4-6
    max_tokens: 128000
    mode: batch
    poll_interval: 60
    thinking: true
    thinking_budget: 16384
    tutor:
      max_tokens: 65536
    annotate:
      context_window: 20
    advisor:
      timeout: 300

  openai_claude:
    model: gpt-5.4                   # default model (tutor + detect)
    max_tokens: 128000
    mode: batch
    poll_interval: 60
    thinking: true
    thinking_budget: 16384
    reasoning_effort: medium   # OpenAI-specific: low | medium | high
    tutor:
      max_tokens: 65536
    annotate:
      model: claude-opus-4-6         # annotation uses Claude
      context_window: 20
    label:
      model: claude-opus-4-6
    advisor:
      model: claude-opus-4-6
      timeout: 300

# Retry settings
retry:
  max_retries: 5
  base_delay: 5

# Evaluation settings
eval:
  iou_threshold: 0.3

# Batch API settings
batch:
  timeout: 86400     # max seconds to poll a batch job (24h)

# Benchmark model config
benchmark:
  version: null                # null = auto-generate as {tutor_profile}_{date}
  scenarios:
    mode: detected                # detected | random | both
    max_scenarios: 0
    random_count: 50
    random_seed: 42
    min_turn: 10

  exchange:
    num_turns: 2
    poll_interval: 60
    prompt_version: v2           # tutor/student system prompt version

  tutor_profiles:
    - anthropic

  student:
    profile: anthropic
    # Selects prompts/benchmark/{prompt_version}/students/{mode}.txt.
    # Modes ported from synth-students (Alexis et al.):
    #   imitate_example          - imitate the real student from the transcript prefix (strongest realism)
    #   simple                   - generic K-12 student persona
    #   expert                   - strong student, no mistakes (upper-bound control)
    #   paraphrase_with_example  - paraphrase the real student's style
    # Set to null to fall back to {prompt_version}/student_system.txt (v1 behavior).
    mode: imitate_example

  detect:
    profile: anthropic
    prompt_version: v5

  annotator:
    profile: anthropic
    prompt_version: profiles
    styles:
      - generous
      - balanced
      - demanding
    context_window: 20
    mode: batch
    poll_interval: 60

  aggregation:
    label_weights:
      effective: 1.0
      partial: 0.5
      ineffective: 0.0

  with_screenshots: false  # opt-in; requires vision-capable models on tutor, student, annotator, detector, labeller
