[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tutor-bench"
description = "A benchmarking and evaluation framework for AI tutoring systems"
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [{ name = "Kyle Lo", email = "kylel@allenai.org" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
requires-python = ">=3.11"
dependencies = [
    "torch>=2.0.0",
    "transformers>=4.30.0",
    "datasets>=2.0.0",
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "tqdm>=4.65.0",
    "pydantic>=2.0.0",
    "omegaconf>=2.3.0",
    "httpx>=0.24.0",
    "rich>=13.0.0",
    "typer>=0.9.0",
    "jinja2>=3.1.0",
    "universal-pathlib>=0.2.0",
    "s3fs>=2024.1.0",
]
dynamic = ["version"]

[project.urls]
Homepage = "https://github.com/allenai/tutor-bench"
Repository = "https://github.com/allenai/tutor-bench"
Issues = "https://github.com/allenai/tutor-bench/issues"

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "pytest-asyncio>=0.21.0",
    "pytest-timeout>=2.1.0",
    "pytest-xdist>=3.3.0",
    "ruff>=0.0.280",
    "pyright>=1.1.0",
    "pre-commit>=3.3.3",
]
eval = [
    "scipy>=1.11.0",
    "scikit-learn>=1.3.0",
    "matplotlib>=3.7.0",
    "seaborn>=0.12.0",
    "plotly>=5.15.0",
]
train = [
    "wandb>=0.15.0",
    "accelerate>=0.21.0",
    "peft>=0.4.0",
    "bitsandbytes>=0.41.0",
    "einops>=0.6.0",
]
all = ["tutor-bench[dev,eval,train]"]

[project.scripts]
tutor-bench = "tutor_bench.cli:main"

[tool.setuptools]
packages = ["tutor_bench"]

[tool.setuptools.dynamic]
version = { attr = "tutor_bench.version.__version__" }

[tool.ruff]
line-length = 120
target-version = "py311"
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    ".mypy_cache",
    ".pytest_cache",
    "build",
    "dist",
    "docs/build",
]

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "B",
    "C4",
    "UP",
]
ignore = [
    "E501",
    "B008",
    "C901",
    "W191",
]

[tool.pyright]
include = ["tutor_bench"]
exclude = ["scripts", "docs", "data", "output", ".venv"]
typeCheckingMode = "standard"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--strict-markers",
    "--tb=short",
    "--capture=no",
    "--cov=tutor_bench",
    "--cov-report=term-missing",
    "--cov-report=html",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
    "gpu: marks tests that require GPU",
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[tool.coverage.run]
source = ["tutor_bench"]
omit = [
    "*/tests/*",
    "*/test_*.py",
    "*/__pycache__/*",
    "*/site-packages/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
