[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "tutorsim"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "anthropic",
    "openai",
    "google-genai",
    "pyyaml",
    "python-dotenv",
    "boto3",
]

[project.optional-dependencies]
dev = ["pytest", "moto[s3]"]
taxonomy = ["pandas"]

[project.scripts]
tutorsim = "tutorsim.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
tutorsim = [
    "default_config.yaml",
    "prompts/tutor/*.txt",
    "prompts/student/*.txt",
    "prompts/student/dimensions/*.txt",
    "prompts/student/trait_generator/*.txt",
    "prompts/scorer/annotate/*.md",
    "prompts/scorer/decompose/*.md",
    "prompts/scorer/structure/*.md",
    "prompts/taxonomy/*.md",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
